name: Build and Release Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # STEP 1: Read the version string directly from package.json to name the release
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      clean_title: ${{ steps.tag.outputs.clean_title }}
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Read Version from package.json
      id: tag
      run: |
        # Extracts the version number field from your root package.json file
        VERSION=$(node -p "require('./package.json').version")
        
        # Behind-the-scenes Git Tag (Keeps a short commit SHA attached so it never conflicts)
        echo "release_tag=v${VERSION}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        
        # Public Display Title (Clean and simple: e.g., v1.0)
        echo "clean_title=v${VERSION}" >> $GITHUB_OUTPUT

  # STEP 2: Deploy an Ubuntu runner to compile the Android environment
  build-android:
    needs: create-tag
    name: Build (Android Mobile)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java (Required for Android compilation)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm ci

    - name: Build Web Assets
      run: npm run build --if-present

    # --- ANDROID SYNC & COMPILATION ---
    - name: Sync Code to Android Environment
      run: npx cap sync android

    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    # --- DISPATCH UPLOAD TO THE DRAFT RELEASE ---
    - name: Dispatch Upload to Shared Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-tag.outputs.release_tag }}
        name: ${{ needs.create-tag.outputs.clean_title }}
        body: |
          Automated Android compilation pipeline.
          Website accessible version deployed tracking live master hooks.
          Repository: awoo-co/catchat-app
          Commit: ${{ github.sha }}
        draft: true
        prerelease: false
        files: android/app/build/outputs/apk/debug/app-debug.apk