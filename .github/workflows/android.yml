name: Build and Release Android APK

on:
  push:
    branches: [ main, master ]  # Triggers on every commit pushed to main/master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the runner permission to create a Release

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java (Required for Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: Build Web Assets
      run: npm run build --if-present

    - name: Sync Web Code to Capacitor Android Shell
      run: |
        npx cap sync android

    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Generate Dynamic Tag Name
      id: tag
      run: |
        # Creates a unique tag using the date, time, and short commit SHA
        echo "release_tag=v$(date +'%Y.%m.%d-%H%M')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: Release ${{ steps.tag.outputs.release_tag }}
        body: |
          Automated build template release.
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false
        files: android/app/build/outputs/apk/debug/app-debug.apk